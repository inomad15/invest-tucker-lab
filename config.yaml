# Tucker Strategy Configuration
# VWAP 리셋: UTC 00:00 (KST 09:00)

trading:
  # PF > 1.0 달성 11종목 (v3 멀티코인 백테스트 검증 완료)
  markets:
    - KRW-BTC    # PF=2.68, EMA9
    - KRW-ETH    # PF=5.19, EMA21
    - KRW-IOST   # PF=2.45, EMA21
    - KRW-RED    # PF=2.28, EMA9
    - KRW-SOL    # PF=1.87, EMA21
    - KRW-DOGE   # PF=1.72, EMA9
    - KRW-XRP    # PF=1.61, EMA21
    - KRW-TREE   # PF=1.42, EMA9
    - KRW-TAO    # PF=1.39, EMA21
    - KRW-HOLO   # PF=1.36, EMA21
    - KRW-XPL    # PF=1.25, EMA21
  mode: spot  # spot only (long only)

strategy:
  # VWAP 설정
  vwap:
    reset_hour_utc: 0  # UTC 00:00 = KST 09:00

  # EMA 설정
  ema:
    period: 9  # 9-EMA (단기 추세)

  # 진입 조건
  entry:
    ema_proximity_pct: 0.3  # EMA 근접 판정 범위 (±0.3%)
    vwap_chop_lookback: 10  # VWAP 횡보 판정용 lookback 봉 수
    vwap_chop_cross_threshold: 3  # 이 횟수 이상 교차하면 횡보로 판정

  # 볼륨 프로파일 설정
  volume_profile:
    num_bins: 20  # 가격대 구간 수
    thin_threshold_pct: 30  # 중위값 대비 이 % 이하면 '얇은' 매물대

  # 청산 조건
  exit:
    # 캔들 몸통(종가)이 9-EMA 아래 마감 시 전량 매도
    use_candle_body: true
    # Phase 3 (2026-04-20): 익절 타겟 + 시간 스탑
    take_profit_pct: 5.0    # +5% 도달 시 즉시 전량 익절 (0 이하 시 비활성)
    time_stop_bars: 48      # 진입 후 N봉 초과 시 강제 청산 (5m×48=4시간)
                            # 5m 타임프레임 기준 파라미터. 0 이하 시 비활성

  # Phase 1: 진입 필터 강화 (2026-04-20 추가)
  # 실시간 10전 1승 9패(-11.39%) 문제 — 과민반응 억제용 추가 필터
  filters:
    rsi:
      period: 14
      threshold: 55.0          # RSI ≥ 55 요구: 과매도 반등 배제, 상승 추세 확인
    volume_ratio:
      lookback: 20             # 최근 20봉 평균 대비
      threshold: 1.5           # 거래량 1.5배 이상 증가 시 진입
    mtf:
      require_agreement: true  # 상위 타임프레임 추세 일치 요구
      timeframes: ["15m", "1h"] # 확인할 HTF 목록 (close>EMA 동시 만족)

    # Phase 2: 변동성 필터 (2026-04-20 추가 — TREE 편중 해소용)
    atr:
      period: 14
      max_pct: 5.0             # ATR/가격 ≤ 5% 요구 (극변동 알트 차단). 0 이하 시 비활성

# Phase 2: 포트폴리오 — 시총 가중 자본 할당 (메타 속성, 향후 실매매 연동 시 사용)
# 현재 run-signal은 시그널 생성만 수행 → 가중치는 전략 인스턴스에 주입되어
# 훗날 실매매 시 포지션 사이징에 사용됨.
portfolio:
  market_cap_weights:
    # Tier 1 (시총 상위, 유동성 최우수)
    KRW-BTC: 3.0
    KRW-ETH: 2.5
    # Tier 2 (시총 상위권)
    KRW-SOL: 2.0
    KRW-XRP: 1.5
    KRW-DOGE: 1.5
    # Tier 3 (중간)
    KRW-TAO: 1.2
    # Tier 4 (소형 알트)
    KRW-IOST: 1.0
    KRW-RED: 1.0
    KRW-TREE: 1.0
    KRW-HOLO: 1.0
    KRW-XPL: 1.0
  default_weight: 1.0          # 위 목록에 없는 종목의 기본값

backtest:
  timeframes:
    - 1m
    - 5m
    - 15m
  initial_capital_krw: 1000000  # 초기 자본 100만원
  fee_rate: 0.0005  # Upbit 수수료 0.05%
  slippage_pct: 0.05  # 슬리피지 0.05%

data:
  lookback_days: 90  # 백테스트용 과거 데이터 일수
